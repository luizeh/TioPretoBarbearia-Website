# Virtual host de produção — a porta __PORT__ é substituída pelo entrypoint
# com o valor de $PORT que o Railway injeta em tempo de execução.
<VirtualHost *:__PORT__>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    # Scripts de deploy (bootstrap.php, entrypoint.sh, configs) nunca devem
    # ser acessíveis pela web — só rodam no start do container.
    <Directory /var/www/html/deploy>
        Require all denied
    </Directory>

    # Pasta de uploads: apenas conteúdo estático.
    # Esta proteção fica no vhost (e NÃO só no .htaccess) porque o diretório
    # é montado como Volume no Railway — o .htaccess versionado some sob o mount.
    <Directory /var/www/html/assets/img/produtos>
        php_admin_flag engine off
        <FilesMatch "(?i)\.(php|php3|php4|php5|php7|phtml|pht|phar|cgi|pl|py|sh|asp|aspx|jsp)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Arquivos sem uso legítimo via web (schema SQL, manifests, dotfiles).
    <FilesMatch "(?i)\.(sql|lock|md|dist|example)$|composer\.json$|package(-lock)?\.json$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
